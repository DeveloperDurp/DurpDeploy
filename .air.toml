root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "tmp/durpdeploy"
  cmd = "templ generate && go build -o tmp/durpdeploy ./cmd/server"
  entrypoint = ["tmp/durpdeploy"]
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "node_modules", "static", "screenshots", ".git", ".idea", ".omo"]
  exclude_file = []
  exclude_regex = ["_test\\.go", "_templ\\.go"]
  exclude_unchanged = true
  follow_symlink = false
  full_bin = ""
  include_dir = ["cmd", "internal", "views", "migrations"]
  include_ext = ["go", "templ", "sql"]
  include_file = []
  kill_delay = "2s"
  log = "build-errors.log"
  poll = false
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = true

[screen]
  clear_on_rebuild = true
  keep_scroll = true
